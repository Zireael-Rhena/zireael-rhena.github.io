<section id="education" class="py-5">
  <div class="container">
    <h3 class="text-center mb-5" style="font-weight: 300;">Education</h3>
    <div class="row justify-content-center">
      <div class="col-lg-10">
        {{ range .Site.Params.education.items }}
        <div class="education-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <h5 class="fw-bold mb-1">{{ .title }}</h5>
              <div class="school-name">
                <a href="{{ .school.url | safeURL }}" target="_blank" class="edu-link">
                  {{ .school.name }}
                </a>
              </div>
            </div>
            <div class="text-muted small fw-bold">{{ .date }}</div>
          </div>
          
          <div class="mt-3">
            {{ if .GPA }}
            <div class="gpa-text mb-2">{{ .GPA | markdownify }}</div>
            {{ end }}
            
            <div class="content-text text-secondary">
              {{ .content | markdownify }}
            </div>
          </div>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>

<style>
  .education-card {
    background: #fff !important;
    border: 1px solid #e0e0e0 !important;
    padding: 25px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .edu-link, .content-text a {
    color: #0056b3 !important;
    text-decoration: underline !important;
    font-weight: 600;
  }
  .gpa-text strong, .content-text strong {
    color: #000 !important;
    font-weight: 700 !important;
  }
</style>
