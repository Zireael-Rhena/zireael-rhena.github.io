  # Hero
  hero:
    enable: true
    title: "Zisen Dai"
    subtitle: "B.S. in Physics, Tsinghua University | Exchange Student, UC Berkeley"
    content: >
      Hello! I'm Zisen Dai /ˈziː sən daɪ/ (戴子森), a 3rd-year undergraduate student majoring in Physics 
      at <a href="https://www.tsinghua.edu.cn/en/" target="_blank">Tsinghua University</a>. I am currently visiting 
      <a href="https://www.berkeley.edu/" target="_blank">UC Berkeley</a> as an exchange student in Astrophysics. <br><br>
      My research broadly focuses on theoretical and observational astrophysics. At Tsinghua, I work on cosmic ray transport in protoplanetary disks 
      advised by <a href="https://i.astro.tsinghua.edu.cn/~xbai/" target="_blank">Xuening Bai</a>. Concurrently at UC Berkeley, 
      I am investigating high-energy transients in <a href="https://wenbinlu.github.io/" target="_blank">Wenbin Lu's group</a>. 
      I am deeply fascinated by these extreme phenomena and aspire to leverage analytical models to uncover the physical mechanisms behind them.
    image: /avatar.jpg
    bottomImage:
      enable: true
    roundImage: true
    button:
      enable: true
      name: "Curriculum Vitae"
      url: "/CV_ZisenDai.pdf"
      download: false
      newPage: true
