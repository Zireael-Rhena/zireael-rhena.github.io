  # projects
  projects:
    enable: true
    title: "Selected Projects"
    items:
      - title: "High-Redshift LBGs Selection via Machine Learning"
        content: "Developed a LightGBM classifier to identify high-redshift Lyman Break Galaxies (z ~ 2-3) from CLAUDS photometric data. 
          By correcting selection bias via TSR/SSR metrics, the model achieved 0.995 AUC and 92.0% purity, significantly outperforming traditional u-dropout methods."
        image: "/images/projects/lbg_selection.png"
        featured:
          name: "Read Report"
          link: "https://zireael-rhena.github.io/Target_Selection_Based_on_Photometric_Data/Final_Report_of_Statistical_Methods_in_Astrophysics.pdf"
        badges:
          - "Photometry"
          - "LBGs"
          - "Machine Learning"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/Zireael-Rhena/Target_Selection_Based_on_Photometric_Data"

      - title: "JUNO Optical Simulation & Signal Reconstruction"
        content: "Built a Python-based Monte Carlo framework to simulate complex photon transport and Fresnel reflection for 17,612 PMTs. 
          Engineered a high-capacity LightGBM model with multi-center Gaussian attention to reconstruct spatial-temporal Probe functions, reducing integral error to ~3%."
        image: "/images/projects/juno.png"
        featured:
          name: "View Source"
          link: "https://github.com/Zireael-Rhena/JUNO-Reconstruction"
        badges:
          - "Simulation"
          - "Monte Carlo"
          - "Machine Learning"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/Zireael-Rhena/JUNO-Reconstruction"

      - title: "Supernova Spectrum & Light Curve Analysis"
        content: "Analyzed multi-band photometric and spectroscopic data to classify SN 2025kid as a Type Ia supernova. 
          Extracted key parameters (peak magnitude, decline rate) of SN 2025fvw via light curve fitting, utilizing the Phillips relation for standardization."
        image: "/images/projects/sn_lightcurve.png"
        featured:
          name: "Read Report"
          link: "https://zireael-rhena.github.io/Spectrum-and-Light-Curve-Analysis-of-SN/ObsAstro25_Project2_Final_Report.pdf"
        badges:
          - "Spectroscopy"
          - "Photometry"
          - "Data Analysis"
        links:
          - icon: "fab fa-github"
            url: "https://github.com/Zireael-Rhena/Spectrum-and-Light-Curve-Analysis-of-SN"

